<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Grinder Challenge Display — Seduh Score</title>
<link rel="stylesheet" href="../../../shared/theme.css">
<style>
  .booth-wrap{max-width:480px;margin:0 auto;padding:var(--space-8) var(--space-4);text-align:center}
  .booth-lead{font-size:14px;color:var(--ink2);margin-bottom:8px}
</style>
</head>
<body>

<header class="plat-hdr">
  <span class="plat-mark">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="22 16 56 48" fill="none" stroke="currentColor" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" role="img" aria-label="Seduh">
      <circle cx="50" cy="26" r="5.5" fill="currentColor" stroke="none"></circle>
      <path d="M26 60 a24 24 0 0 1 48 0"></path>
      <path d="M35 60 a15 15 0 0 1 30 0"></path>
      <path d="M44 60 a6 6 0 0 1 12 0"></path>
    </svg>
  </span>
  <div>
    <div class="plat-hdr-sub" style="font-size:10px;color:var(--am);font-weight:700;letter-spacing:.15em;text-transform:uppercase">Seduh Score</div>
    <div class="plat-hdr-name">Grinder Challenge</div>
  </div>
</header>

<!-- Grinder Challenge display — coming soon -->
<div class="booth-wrap">
  <p class="booth-lead">Grinder Challenge display is not yet available.</p>
  <p class="booth-lead">Use booth/grinder/index.html to operate the timer.</p>
</div>

</body>
</html>
