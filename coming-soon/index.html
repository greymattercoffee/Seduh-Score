<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Seduh Score — Coming Soon</title>
<link rel="stylesheet" href="../shared/theme.css">
<style>
  body{overflow-x:hidden}

  .cs-tagline{font-size:var(--fs-xs);color:var(--txt3);font-weight:var(--fw-medium)}

  .cs-offline{
    display:none;margin:var(--space-4) clamp(16px,4vw,40px) 0;padding:8px 14px;
    background:var(--surface2);border:1.5px solid var(--border);border-radius:var(--rad-pill);
    font-family:var(--font-mono);font-size:var(--fs-xs);color:var(--txt3);
    max-width:fit-content;
  }

  .carousel-wrapper{
    position:relative;max-width:var(--container-narrow);margin:0 auto;
    padding:clamp(20px,4vw,40px) clamp(16px,4vw,40px) 0;
  }

  .carousel-slide{opacity:0;transition:opacity .8s ease}
  .carousel-slide.active{opacity:1}

  .slide-image{
    width:100%;aspect-ratio:16/9;object-fit:cover;border-radius:var(--rad);
    background:var(--surface2);display:block;box-shadow:var(--shadow-sm);
  }
  .slide-image-empty{
    display:flex;align-items:center;justify-content:center;color:var(--txt3);
    font-family:var(--font-mono);font-size:var(--fs-xs);
  }

  .slide-content{padding:var(--space-5) 0}
  .slide-format-badge{
    display:inline-block;padding:4px 12px;border-radius:var(--rad-pill);
    font-family:var(--font-mono);font-size:var(--fs-xs);font-weight:var(--fw-bold);
    text-transform:uppercase;letter-spacing:var(--ls-label);border:1.5px solid;margin-bottom:var(--space-3);
  }
  .fmt-am{background:var(--am-bg);border-color:var(--am-bd);color:var(--am)}
  .fmt-gn{background:var(--gn-bg);border-color:var(--gn-bd);color:var(--gn)}
  .fmt-bl{background:var(--bl-bg);border-color:var(--bl-bd);color:var(--bl)}

  .slide-event-name{
    font-family:var(--font-display);font-weight:var(--fw-extrabold);font-size:var(--fs-display);
    color:var(--txt);letter-spacing:var(--ls-tight);line-height:var(--lh-snug);margin-bottom:var(--space-2);
  }
  .slide-event-date,.slide-event-venue{font-size:var(--fs-body);color:var(--txt2)}
  .slide-description{font-size:var(--fs-body);color:var(--txt3);margin-top:var(--space-3);line-height:var(--lh-body)}

  .slide-timer-bar{height:3px;background:var(--border);border-radius:var(--rad-pill);overflow:hidden;margin-top:var(--space-5)}
  .slide-timer-bar-fill{height:100%;width:0%;background:var(--am)}

  .carousel-controls{
    display:flex;align-items:center;justify-content:center;gap:var(--space-4);
    padding:var(--space-4) 0 var(--space-8);
  }
  .btn-prev,.btn-next{
    width:40px;height:40px;border-radius:50%;border:1.5px solid var(--border);
    background:var(--surface);color:var(--txt2);font-size:18px;cursor:pointer;
    display:flex;align-items:center;justify-content:center;transition:border-color .14s,color .14s;
  }
  .btn-prev:hover,.btn-next:hover{border-color:var(--am-bd);color:var(--am)}
  .slide-counter{font-family:var(--font-mono);font-size:var(--fs-sm);color:var(--txt3);min-width:44px;text-align:center}

  .coming-soon-footer{
    text-align:center;padding:var(--space-6) clamp(16px,4vw,40px) var(--space-8);
    color:var(--txt3);font-size:var(--fs-xs);
  }
  .coming-soon-footer a{color:var(--am);text-decoration:none;font-weight:var(--fw-medium)}
  .coming-soon-footer a:hover{text-decoration:underline}

  @media (max-width:600px){
    .cs-tagline{display:none}
  }
</style>
</head>
<body>

<div class="plat-hdr">
  <a class="plat-hdr-logo" href="../index.html">
    <span class="plat-mark"><svg xmlns="http://www.w3.org/2000/svg" viewBox="22 16 56 48" fill="none" stroke="currentColor" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" role="img" aria-label="Seduh"><circle cx="50" cy="26" r="5.5" fill="currentColor" stroke="none"/><path d="M26 60 a24 24 0 0 1 48 0"/><path d="M35 60 a15 15 0 0 1 30 0"/><path d="M44 60 a6 6 0 0 1 12 0"/></svg></span>
    <div>
      <div class="plat-hdr-name">Seduh Score</div>
      <div class="plat-hdr-sub">Coming soon</div>
    </div>
  </a>
  <div class="plat-hdr-actions">
    <span class="cs-tagline">Powering the Brunei coffee scene</span>
  </div>
</div>

<div id="cs-offline" class="cs-offline"></div>

<div class="carousel-wrapper" id="carousel">
  <div id="cs-slides"></div>
  <div class="empty" id="cs-empty">Loading events…</div>
  <div class="carousel-controls" id="cs-controls" style="display:none">
    <button class="btn-prev" id="cs-prev" aria-label="Previous event">‹</button>
    <span class="slide-counter" id="cs-counter">1 / 1</span>
    <button class="btn-next" id="cs-next" aria-label="Next event">›</button>
  </div>
</div>

<div class="coming-soon-footer">
  Seduh Score · Coming soon — <a href="../index.html">Learn more on the main site</a>
</div>

<script type="module">
import { db } from '../shared/firebase.js';
import { collection, query, orderBy, onSnapshot }
  from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

const CACHE_KEY = 'seduh_upcoming_events_cache';
const ROTATE_MS = 5000;

const FORMAT_META = {
  'throwdown':  { label: 'Throwdown',  cls: 'fmt-am' },
  'liga':       { label: 'Liga',       cls: 'fmt-gn' },
  'cup-taster': { label: 'Cup Taster', cls: 'fmt-bl' },
};

const $ = id => document.getElementById(id);

let events = [];
let idx = 0;
let autoTimer = null;

function esc(s) {
  return String(s ?? '').replace(/[&<>"']/g, c => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c]));
}

function formatDate(iso) {
  const d = new Date(iso);
  if (isNaN(d)) return esc(iso);
  return d.toLocaleDateString('en-GB', { day: 'numeric', month: 'long', year: 'numeric', hour: '2-digit', minute: '2-digit', timeZone: 'Asia/Brunei' }) + ' BNT';
}

function loadCache() {
  try {
    const raw = localStorage.getItem(CACHE_KEY);
    return raw ? JSON.parse(raw) : null;
  } catch { return null; }
}

function saveCache(list) {
  try { localStorage.setItem(CACHE_KEY, JSON.stringify({ events: list, cachedAt: Date.now() })); } catch {}
}

function showOffline(stale) {
  const el = $('cs-offline');
  el.style.display = 'block';
  el.textContent = stale
    ? 'Offline mode — showing cached events (may be outdated)'
    : 'Offline mode — showing cached events';
}

function hideOffline() {
  $('cs-offline').style.display = 'none';
}

function renderEmpty(msg) {
  $('cs-slides').innerHTML = '';
  $('cs-controls').style.display = 'none';
  const empty = $('cs-empty');
  empty.style.display = 'block';
  empty.textContent = msg;
}

function runFill() {
  const fill = $('cs-fill');
  if (!fill) return;
  fill.style.transition = 'none';
  fill.style.width = '0%';
  void fill.offsetWidth; // force reflow so the transition below restarts cleanly
  fill.style.transition = 'width ' + (ROTATE_MS / 1000) + 's linear';
  fill.style.width = '100%';
}

function renderSlide(fade) {
  const ev = events[idx];
  if (!ev) { renderEmpty('No upcoming events yet — check back soon.'); return; }

  $('cs-empty').style.display = 'none';
  $('cs-controls').style.display = events.length > 1 ? 'flex' : 'none';

  const fmt = FORMAT_META[ev.eventFormat] || { label: ev.eventFormat || 'Event', cls: 'fmt-am' };
  const html =
    '<div class="carousel-slide active">' +
      (ev.imageUrl
        ? '<img class="slide-image" src="' + esc(ev.imageUrl) + '" alt="">'
        : '<div class="slide-image slide-image-empty">☕ Image coming soon</div>') +
      '<div class="slide-content">' +
        '<div class="slide-format-badge ' + fmt.cls + '">' + esc(fmt.label) + '</div>' +
        '<div class="slide-event-name">' + esc(ev.eventName) + '</div>' +
        '<div class="slide-event-date">' + formatDate(ev.eventDate) + '</div>' +
        '<div class="slide-event-venue">' + esc(ev.eventVenue) + '</div>' +
        (ev.eventDescription ? '<div class="slide-description">' + esc(ev.eventDescription) + '</div>' : '') +
        '<div class="slide-timer-bar"><div class="slide-timer-bar-fill" id="cs-fill"></div></div>' +
      '</div>' +
    '</div>';

  const el = $('cs-slides');
  const apply = () => { el.innerHTML = html; runFill(); };

  if (fade && el.firstChild) {
    el.style.opacity = '0';
    setTimeout(() => { apply(); el.style.opacity = '1'; }, 300);
  } else {
    el.style.opacity = '1';
    apply();
  }

  $('cs-counter').textContent = (idx + 1) + ' / ' + events.length;
}

function scheduleAuto() {
  clearTimeout(autoTimer);
  if (events.length <= 1) return;
  autoTimer = setTimeout(() => goTo(idx + 1), ROTATE_MS);
}

function goTo(newIdx) {
  if (!events.length) return;
  idx = ((newIdx % events.length) + events.length) % events.length;
  renderSlide(true);
  scheduleAuto();
}

function applyEvents(list, fromCache) {
  events = list;
  idx = 0;
  renderSlide(false);
  scheduleAuto();
  if (fromCache) {
    const cache = loadCache();
    const stale = !!(cache && (Date.now() - cache.cachedAt > 60 * 60 * 1000));
    showOffline(stale);
  } else {
    hideOffline();
  }
}

function fallbackToCache(reason) {
  const cache = loadCache();
  if (cache && Array.isArray(cache.events) && cache.events.length) {
    applyEvents(cache.events, true);
  } else {
    renderEmpty(reason);
    hideOffline();
  }
}

$('cs-prev').addEventListener('click', () => goTo(idx - 1));
$('cs-next').addEventListener('click', () => goTo(idx + 1));
document.addEventListener('keydown', e => {
  if (e.key === 'ArrowLeft') goTo(idx - 1);
  if (e.key === 'ArrowRight') goTo(idx + 1);
});

try {
  const q = query(collection(db, 'upcoming_events'), orderBy('eventDate', 'asc'));
  onSnapshot(q,
    snap => {
      const list = [];
      snap.forEach(d => list.push({ id: d.id, ...d.data() }));
      saveCache(list);
      applyEvents(list, false);
    },
    err => {
      console.warn('upcoming_events snapshot error, falling back to cache:', err);
      fallbackToCache('Unable to load events right now.');
    }
  );
} catch (e) {
  console.warn('Firestore unavailable, falling back to cache:', e);
  fallbackToCache('Unable to load events right now.');
}
</script>
</body>
</html>
