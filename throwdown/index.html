<style>
/* ── Throwdown-specific styles ── */
.app{max-width:900px;margin:0 auto;padding:0 0 60px;container-type:inline-size}
.body{padding:1.25rem 1.5rem;display:flex;flex-direction:column;gap:1rem}
/* Setup */
.judge-range{display:flex;align-items:center;gap:12px}
.judge-range input[type=range]{flex:1;accent-color:var(--am)}
.judge-count-display{font-size:22px;font-weight:700;color:var(--am);width:32px;text-align:center}
/* Redemption config */
.redemption-row{display:flex;align-items:flex-start;gap:12px;padding:.75rem;background:var(--bg);border:1.5px solid var(--border);border-radius:var(--rad-s)}
.big-check{width:20px;height:20px;accent-color:var(--am);cursor:pointer;flex-shrink:0;margin-top:2px}
.round-checks{display:flex;gap:10px;flex-wrap:wrap;margin-top:6px}
.round-check-item{display:flex;align-items:center;gap:5px;font-size:12px;font-weight:600;color:var(--txt2)}
.round-check-item.disabled-check{opacity:.35;cursor:not-allowed}
.round-check-item input{accent-color:var(--am)}
/* Participant entry */
.p-list{display:flex;flex-direction:column;gap:5px;margin-top:8px;max-height:260px;overflow-y:auto}
.p-item{display:flex;align-items:center;gap:8px;padding:6px 10px;background:var(--bg);border:1.5px solid var(--border);border-radius:var(--rad-s)}
.p-seed{font-size:11px;color:var(--txt3);width:20px;text-align:center;font-weight:700}
.p-name{flex:1;font-size:13px;font-weight:600}
.p-rm{background:none;border:none;cursor:pointer;color:var(--txt3);font-size:15px;line-height:1;padding:0}
/* Bracket */
.bracket-section{margin-bottom:1.25rem}
.bslot{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--rad);overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.06);margin-bottom:8px}
.bslot.active{border-color:var(--am-bd);border-left:4px solid var(--am)}
.bslot.done{border-color:var(--gn-bd);border-left:4px solid var(--gn)}
.bslot.redemption{border-color:var(--pu-bd);border-left:4px solid var(--pu)}
.bslot.redemption.active{border-color:var(--pu-bd)}
.bslot-hdr{display:flex;align-items:center;justify-content:space-between;padding:.4rem .85rem;background:var(--bg);border-bottom:1.5px solid var(--border2);font-size:11px;font-weight:700;color:var(--txt3);text-transform:uppercase;letter-spacing:.08em}
.bslot-teams{padding:.6rem .85rem;display:flex;flex-direction:column;gap:4px}
.bslot-team{display:flex;align-items:center;gap:8px;padding:4px 6px;border-radius:var(--rad-s)}
.bslot-team.winner-row{background:var(--gn-bg)}
.bslot-seed{font-size:10px;color:var(--txt3);width:22px;text-align:center;font-weight:700;background:var(--bg);border-radius:3px;padding:1px 3px;border:1px solid var(--border);flex-shrink:0}
.bslot-name{flex:1;font-size:13px;font-weight:600;color:var(--txt)}
.bslot-name.tbd{color:var(--txt3);font-style:italic;font-weight:400}
.bslot-name.winner{color:var(--gn);font-weight:700}
.bslot-name.loser{color:var(--txt3);font-weight:400}
.bslot-votes{font-size:14px;font-weight:700;color:var(--am);flex-shrink:0;min-width:28px;text-align:right}
.bslot-divider{height:1px;background:var(--border2);margin:0 .85rem}
.bslot-footer{padding:.5rem .85rem;display:flex;align-items:center;justify-content:space-between;background:var(--bg);border-top:1.5px solid var(--border2)}
.bslot-status{font-size:11px;color:var(--txt3);font-weight:600}
.bslot-status.ready{color:var(--am)}
.bslot-status.done-lbl{color:var(--gn);font-weight:700}
.bslot-status.bye{color:var(--bl);font-weight:600}
/* Scoring modal */
.score-modal{position:fixed;inset:0;z-index:500;background:rgba(0,0,0,.55);display:flex;align-items:center;justify-content:center;padding:1rem}
.score-modal-box{background:var(--surface);border-radius:var(--rad);width:100%;max-width:480px;box-shadow:0 8px 40px rgba(0,0,0,.2);overflow:hidden}
.score-modal-hdr{padding:.85rem 1.25rem;border-bottom:2px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.score-modal-hdr h3{font-size:15px;font-weight:700}
.score-modal-body{padding:1.25rem}
.competitor-vote{display:flex;align-items:center;gap:12px;padding:.75rem;background:var(--bg);border:1.5px solid var(--border);border-radius:var(--rad-s);margin-bottom:10px}
.competitor-vote-name{flex:1;font-size:14px;font-weight:700}
.vote-btns{display:flex;gap:4px}
.vbtn{width:36px;height:36px;border-radius:var(--rad-s);border:1.5px solid var(--border);background:transparent;cursor:pointer;font-size:13px;font-weight:700;color:var(--txt2)}
.vbtn.on{background:var(--am);border-color:var(--am);color:#fff}
.vbtn:hover:not(.on):not(:disabled){background:var(--am-bg);border-color:var(--am-bd)}
.vbtn:disabled{opacity:.2;cursor:default}
.vote-total{font-size:18px;font-weight:700;color:var(--am);width:32px;text-align:center}
.vote-summary{padding:.75rem;background:var(--bg);border:1.5px solid var(--border);border-radius:var(--rad-s);font-size:13px;color:var(--txt2);margin-bottom:1rem;font-weight:600}
.vote-summary .winner-preview{color:var(--gn);font-weight:700}
.vote-summary .tie-preview{color:var(--rd);font-weight:700}
/* History */
.hr-row{display:flex;align-items:center;gap:8px;padding:.7rem 1rem;background:var(--surface);border:1.5px solid var(--border);border-radius:var(--rad);flex-wrap:wrap}
.hr-rb{font-size:10px;color:var(--txt3);background:var(--bg);border:1.5px solid var(--border);border-radius:var(--rad-s);padding:2px 7px;white-space:nowrap;flex-shrink:0;text-transform:uppercase;letter-spacing:.05em;font-weight:700}
.hr-rb.rd{background:var(--pu-bg);border-color:var(--pu-bd);color:var(--pu)}
.hr-t{flex:1;font-size:13px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.hr-t.w{font-weight:700;color:var(--am)}
.hr-v{font-size:16px;font-weight:700;flex-shrink:0}
.hvs{font-size:10px;color:var(--txt3);padding:0 3px;flex-shrink:0;font-weight:700}
/* Event info responsive grid */
.ev-info-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
@media(max-width:479px){.ev-info-grid{grid-template-columns:1fr 1fr}}
</style>

<!-- Audience overlay (shared) -->

  <div class="aud-hdr">
    <div class="aud-hdr-left">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="22 16 56 48" fill="none" stroke="currentColor" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" style="width:28px;height:28px;flex-shrink:0;color:var(--aud-accent)"><circle cx="50" cy="26" r="5.5" fill="currentColor" stroke="none"/><path d="M26 60 a24 24 0 0 1 48 0"/><path d="M35 60 a15 15 0 0 1 30 0"/><path d="M44 60 a6 6 0 0 1 12 0"/></svg>

<!-- Score entry modal -->
<div id="score-modal" style="display:none" class="score-modal">
  <div class="score-modal-box">
    <div class="score-modal-hdr">
      <h3 id="sm-title">Score Match</h3>

<div class="app" id="app"></div>

<script src="../shared/storage.js"></script>
<script src="../shared/gates.js"></script>
<script src="../shared/eventconfig.js"></script>
<script src="../shared/timer.js"></script>
<script src="../shared/audience.js"></script>
<script>
const STORE = Store('seduh_throwdown_v1');
let mid = 0;
let chromeInited = false;

const DEFAULT_STATE = () => ({
  eventName: '', eventDate: '', eventVenue: '',
  judges: 3,
  judgeList: [],
  redemption: false,
  redemptionRounds: { r1: true, r2: false },
  redemptionCap: 0,
  redemptionGroupSize: 3,
  wildCard: false,
  thirdPlace: false,
  manualBracket: false,  // organiser assigns names to slots manually
  manualSlots: 0,        // number of slots (set independently of participant count)
  isTest: true,          // Seduh Records archive flag (POA-40) — default true, safer
  participants: [],
  bracket: null,
  matches: [],
  tab: 'setup',
  scoringMatchId: null,
});

let S = DEFAULT_STATE();

/* ── Load ── */
(function(){
  const d = STORE.load();
  if (d) {
    S = { ...DEFAULT_STATE(), ...d };
    mid = d._mid || 0;
  }
})();

function save() {
  STORE.save({ ...S, _mid: mid });
}

function exportJSON() {
  const payload = { ...S, _mid: mid, _module: 'throwdown' };
  const blob = new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  const name = (S.eventName || 'throwdown').replace(/\s+/g, '_').toLowerCase();
  a.href = url;
  a.download = 'seduh_' + name + '_' + Date.now() + '.json';
  a.click();
  URL.revokeObjectURL(url);
}

function importJSON() {
  const inp = document.createElement('input');
  inp.type = 'file';
  inp.accept = '.json,application/json';
  inp.onchange = e => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = ev => {
      try {
        const d = JSON.parse(ev.target.result);
        if (d._module !== 'throwdown') {
          alert('This file is not a Throwdown save. Import cancelled.');
          return;
        }
        const { _mid, _module, ...rest } = d;
        S = { ...DEFAULT_STATE(), ...rest };
        mid = _mid ?? 0;
        save();
        render();
      } catch {
        alert('Could not read file. Make sure it is a valid Throwdown JSON export.');
      }
    };
    reader.readAsText(file);
  };
  inp.click();
}

/* ── Bracket helpers ── */
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length-1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i+1));
    [a[i],a[j]] = [a[j],a[i]];
  }
  return a;
}

function buildPairs(names) {
  // Returns [{id, t1, t2, bye:false}] — if odd, last gets bye
  const pairs = [];
  const list = [...names];
  while (list.length >= 2) {
    pairs.push({ id: String(mid++), t1: list.shift(), t2: list.shift(), bye: false, matchId: null, winner: null, loser: null, votes1: 0, votes2: 0 });
  }
  if (list.length === 1) {
    pairs.push({ id: String(mid++), t1: list[0], t2: null, bye: true, matchId: null, winner: list[0], loser: null, votes1: 0, votes2: 0 });
  }
  return pairs;
}

function buildRedemptionGroups(losers, groupSize) {
  const shuffled = [...losers].sort(() => Math.random() - 0.5);
  const groups = [];
  for (let i = 0; i < shuffled.length; i += groupSize) {
    groups.push(shuffled.slice(i, i + groupSize));
  }
  return groups;
}

function generateBracket() {
  const names = shuffle(S.participants.map(p => p.name));
  const b = {
    rounds: [],
    mainPool: [], redemptionPool: [], mergedPool: [],
    phase: 'main', currentRound: 0, mainRoundsDone: 0,
  };
  const r1pairs = buildPairs(names);
  b.rounds.push({ label: 'Round 1', phase: 'main', roundNum: 1, pairs: r1pairs });
  b.mainPool = []; b.redemptionPool = [];
  S.bracket = b;
  save();
}

function generateManualBracket() {
  const slots = Math.max(2, S.manualSlots);
  const pairs = [];
  for (let i = 0; i < Math.ceil(slots / 2); i++) {
    pairs.push({ id: String(mid++), t1: null, t2: null, bye: false, matchId: null, winner: null, loser: null, votes1: 0, votes2: 0 });
  }
  const b = {
    rounds: [{ label: 'Round 1', phase: 'main', roundNum: 1, pairs }],
    mainPool: [], redemptionPool: [], mergedPool: [],
    phase: 'manual-setup', currentRound: 0, mainRoundsDone: 0,
  };
  S.bracket = b;
  save();
}

function startManualBracket() {
  const b = S.bracket;
  const round = b.rounds[0];
  const allNames = round.pairs
    .flatMap(p => [p.t1, p.t2])
    .filter(Boolean);
  const dupes = allNames
    .filter((n, i) => allNames.indexOf(n) !== i);
  if (dupes.length) {
    alert('Duplicate assignment: '
      + [...new Set(dupes)].join(', ')
      + '. Each participant can only appear once.');
    return;
  }
  // Resolve nulls: one name + null → bye; both null → drop
  round.pairs = round.pairs
    .filter(p => p.t1 || p.t2)
    .map(p => {
      if (p.t1 && !p.t2) return { ...p, bye: true, winner: p.t1 };
      if (p.t2 && !p.t1) return { ...p, t1: p.t2, t2: null, bye: true, winner: p.t2 };
      return p;
    });
  if (round.pairs.length < 1) return;
  b.phase = 'main';
  save();
  S.tab = 'bracket';
  render();
}

function refreshManualSelects() {
  const sels = document.querySelectorAll('.ms-sel');
  const used = [...sels].map(s => s.value).filter(Boolean);
  sels.forEach(sel => {
    [...sel.options].forEach(opt => {
      if (!opt.value) return;
      opt.disabled = used.includes(opt.value)
        && opt.value !== sel.value;
    });
  });
}

function getActiveRound() {
  if (!S.bracket) return null;
  return S.bracket.rounds[S.bracket.rounds.length - 1];
}

function isRoundComplete(round) {
  return round.pairs.every(p => p.bye || p.winner !== null);
}

function advanceBracket() {
  const b = S.bracket;
  const lastRound = b.rounds[b.rounds.length - 1];
  if (!isRoundComplete(lastRound)) return;

  const winners = lastRound.pairs.map(p => p.winner).filter(Boolean);
  const losers  = lastRound.pairs.filter(p => !p.bye && p.loser).map(p => p.loser);

  if (lastRound.phase === 'main') {
    b.mainRoundsDone++;
    const roundNum = b.mainRoundsDone;

    // Wild card: pause before advancing so organizer can draw
    if (S.wildCard && !b.wildCards) b.wildCards = {};
    if (S.wildCard && b.wildCards[roundNum] === undefined && losers.length > 0 && winners.length > 1) {
      b.pendingWildCard = roundNum;
      b.pendingWildCardLosers = losers;
      save(); return; // wait for draw or skip
    }

    // Collect wild card person if drawn (not skipped)
    const wcPerson = S.wildCard && b.wildCards && b.wildCards[roundNum];
    const advancingWinners = wcPerson ? [...winners, wcPerson] : winners;
    if (wcPerson) {
      if (!b.revivedNames) b.revivedNames = [];
      b.revivedNames.push(wcPerson);
    }

    // Collect losers into redemption pool if enabled for this round
    const rdKey = 'r' + roundNum;
    if (S.redemption && S.redemptionRounds[rdKey]) {
      // Exclude wild card person from redemption pool
      b.redemptionPool.push(...losers.filter(l => l !== wcPerson));
    }

    // Fire redemption round if pool is ready
    if (S.redemption && b.redemptionPool.length >= 2 && S.redemptionRounds[rdKey]) {
      const rdMatches = buildRedemptionGroups(b.redemptionPool, S.redemptionGroupSize || 3)
        .map(group => ({
          id: String(mid++),
          brewers: group,
          votes: Object.fromEntries(group.map(n => [n, 0])),
          tiebreaker: null,
          winner: null
        }));
      b.rounds.push({ label: 'Redemption Round ' + roundNum, phase: 'redemption', roundNum, pairs: rdMatches });
      b.redemptionPool = [];
      b.phase = 'redemption';
    } else if (advancingWinners.length >= 2) {
      const nextLabel = getNextRoundLabel(b, advancingWinners.length);
      // 3rd place: if enabled and next round is Final, push 3rd place match alongside
      if (S.thirdPlace && nextLabel === 'Final' && losers.length >= 2) {
        const thirdLosers = losers.filter(l => l !== wcPerson).slice(0, 2);
        if (thirdLosers.length === 2) {
          b.rounds.push({ label: '3rd Place', phase: 'third', roundNum: b.mainRoundsDone + 1, pairs: buildPairs(thirdLosers) });
          b.rounds.push({ label: 'Final', phase: 'main', roundNum: b.mainRoundsDone + 1, pairs: buildPairs(shuffle(advancingWinners)) });
          b.phase = 'main';
          save(); return;
        }
      }
      const nextPairs = buildPairs(shuffle(advancingWinners));
      b.rounds.push({ label: nextLabel, phase: 'main', roundNum: b.mainRoundsDone + 1, pairs: nextPairs });
      b.phase = 'main';
    } else if (advancingWinners.length === 1) {
      b.phase = 'done';
    }
  } else if (lastRound.phase === 'redemption') {
    // Apply redemption cap if set
    const cap = S.redemptionCap > 0 ? S.redemptionCap : winners.length;
    const rdWinners = winners.slice(0, cap);

    // Lucky loser: if winners < cap, pause to randomly fill the gap from redemption losers
    const alreadyDrawn = (b.luckyLosers || []).length;
    if (rdWinners.length + alreadyDrawn < cap) {
      const nonWinners = lastRound.pairs
        .flatMap(m => m.brewers.filter(n => n !== m.winner))
        .filter(n => !rdWinners.includes(n) && !(b.luckyLosers || []).includes(n));
      if (nonWinners.length > 0) {
        if (!b.luckyLosers) b.luckyLosers = [];
        b.pendingLuckyLoser = {
          rdRound: lastRound.roundNum,
          slotsNeeded: cap - rdWinners.length - b.luckyLosers.length,
          pool: nonWinners,
        };
        save(); return; // pause for draw
      }
    }

    // All slots filled — merge main winners + redemption winners + lucky losers
    const allRevived = [...rdWinners, ...(b.luckyLosers || [])].slice(0, cap);
    const mainWinners = b.rounds
      .filter(r => r.phase === 'main' && isRoundComplete(r))
      .slice(-1)[0]?.pairs.map(p => p.winner).filter(Boolean) || [];

    const merged = shuffle([...mainWinners, ...allRevived]);
    if (merged.length >= 2) {
      const nextLabel = getNextRoundLabel(b, merged.length);
      const nextPairs = buildPairs(merged);
      if (!b.revivedNames) b.revivedNames = [];
      b.revivedNames.push(...allRevived);
      b.luckyLosers = [];       // reset for next redemption round
      b.pendingLuckyLoser = null;
      b.rounds.push({ label: nextLabel, phase: 'main', roundNum: b.mainRoundsDone + 1, pairs: nextPairs });
      b.phase = 'main';
    } else {
      b.phase = 'done';
    }
  }
  save();
}

function drawWildCard() {
  const b = S.bracket;
  const roundNum = b.pendingWildCard;     // capture before clearing
  const losers = b.pendingWildCardLosers || [];
  if (!losers.length) return;
  const lucky = losers[Math.floor(Math.random() * losers.length)];
  if (!b.wildCards) b.wildCards = {};
  b.wildCards[roundNum] = lucky;
  b.pendingWildCard = null;
  b.pendingWildCardLosers = [];

  // Track as revived
  if (!b.revivedNames) b.revivedNames = [];
  b.revivedNames.push(lucky);

  save();
  render(); // show reveal banner — organiser taps Continue to advance
}

// Called by wc-continue button after reveal. Does NOT call advanceBracket()
// to avoid double-incrementing mainRoundsDone.
function continueAfterWildCard(roundNum) {
  const b = S.bracket;
  const wcPerson = b.wildCards && b.wildCards[roundNum];  // the drawn name

  // Winners from the round that just completed (the round that triggered the wild card)
  const mainRound = b.rounds.filter(r => r.phase === 'main' && isRoundComplete(r)).slice(-1)[0];
  if (!mainRound) return;
  const winners = mainRound.pairs.map(p => p.winner).filter(Boolean);
  const losers  = mainRound.pairs.filter(p => !p.bye && p.loser).map(p => p.loser);

  const advancingWinners = wcPerson ? [...winners, wcPerson] : winners;

  // Redemption pool — exclude wild card person
  const rdKey = 'r' + roundNum;
  if (S.redemption && S.redemptionRounds[rdKey]) {
    b.redemptionPool.push(...losers.filter(l => l !== wcPerson));
  }

  // Fire redemption round if pool ready, else push next main round
  if (S.redemption && b.redemptionPool.length >= 2 && S.redemptionRounds[rdKey]) {
    const rdMatches = buildRedemptionGroups(b.redemptionPool, S.redemptionGroupSize || 3)
      .map(group => ({
        id: String(mid++),
        brewers: group,
        votes: Object.fromEntries(group.map(n => [n, 0])),
        tiebreaker: null,
        winner: null
      }));
    b.rounds.push({ label: 'Redemption Round ' + roundNum, phase: 'redemption', roundNum, pairs: rdMatches });
    b.redemptionPool = [];
    b.phase = 'redemption';
  } else if (advancingWinners.length >= 2) {
    const nextLabel = getNextRoundLabel(b, advancingWinners.length);
    const nextPairs = buildPairs(shuffle(advancingWinners));
    b.rounds.push({ label: nextLabel, phase: 'main', roundNum: b.mainRoundsDone + 1, pairs: nextPairs });
    b.phase = 'main';
  } else if (advancingWinners.length === 1) {
    b.phase = 'done';
  }

  save();
  render();
}

function skipWildCard() {
  const b = S.bracket;
  const roundNum = b.pendingWildCard;     // capture before clearing
  const losers = b.pendingWildCardLosers || [];
  if (!b.wildCards) b.wildCards = {};
  b.wildCards[roundNum] = null;           // null = explicitly skipped
  b.pendingWildCard = null;
  b.pendingWildCardLosers = [];

  // Resume advancement using the correct roundNum (mainRoundsDone was already
  // incremented in the first advanceBracket call — don't call it again)
  const lastRound = b.rounds[b.rounds.length - 1];
  const winners = lastRound.pairs.map(p => p.winner).filter(Boolean);

  // Collect losers into redemption pool if enabled for this round
  const rdKey = 'r' + roundNum;
  if (S.redemption && S.redemptionRounds[rdKey]) {
    b.redemptionPool.push(...losers);
  }

  // Fire redemption round if pool is ready
  if (S.redemption && b.redemptionPool.length >= 2 && S.redemptionRounds[rdKey]) {
    const rdMatches = buildRedemptionGroups(b.redemptionPool, S.redemptionGroupSize || 3)
      .map(group => ({
        id: String(mid++),
        brewers: group,
        votes: Object.fromEntries(group.map(n => [n, 0])),
        tiebreaker: null,
        winner: null
      }));
    b.rounds.push({ label: 'Redemption Round ' + roundNum, phase: 'redemption', roundNum, pairs: rdMatches });
    b.redemptionPool = [];
    b.phase = 'redemption';
  } else if (winners.length >= 2) {
    const nextLabel = getNextRoundLabel(b, winners.length);
    // 3rd place: if enabled and this resolves to a Final, push 3rd place match alongside
    if (S.thirdPlace && nextLabel === 'Final' && losers.length >= 2) {
      const thirdLosers = losers.slice(0, 2);
      if (thirdLosers.length === 2) {
        b.rounds.push({ label: '3rd Place', phase: 'third', roundNum: b.mainRoundsDone + 1, pairs: buildPairs(thirdLosers) });
        b.rounds.push({ label: 'Final', phase: 'main', roundNum: b.mainRoundsDone + 1, pairs: buildPairs(shuffle(winners)) });
        b.phase = 'main';
        save(); render(); return;
      }
    }
    const nextPairs = buildPairs(shuffle(winners));
    b.rounds.push({ label: nextLabel, phase: 'main', roundNum: b.mainRoundsDone + 1, pairs: nextPairs });
    b.phase = 'main';
  } else if (winners.length === 1) {
    b.phase = 'done';
  }

  save();
  render();
}

function drawLuckyLoser() {
  const b = S.bracket;
  const pending = b.pendingLuckyLoser;
  if (!pending || !pending.pool.length) return;

  // Pick randomly from remaining pool
  const idx = Math.floor(Math.random() * pending.pool.length);
  const lucky = pending.pool[idx];

  if (!b.luckyLosers) b.luckyLosers = [];
  b.luckyLosers.push(lucky);

  // Remove from pool and decrement slots needed
  pending.pool = pending.pool.filter(n => n !== lucky);
  pending.slotsNeeded--;

  if (pending.slotsNeeded <= 0 || pending.pool.length === 0) {
    // All slots filled — clear pending, proceed to merge on Continue
    b.pendingLuckyLoser = { ...pending, done: true };
  }

  save();
  render(); // show reveal, organiser taps Continue or Draw again
}

function continueAfterLuckyLoser() {
  const b = S.bracket;
  // Clear pending state then re-run redemption advancement
  b.pendingLuckyLoser = null;
  save();
  advanceBracket();
  render();
}

function getNextRoundLabel(b, count) {
  if (count <= 2) return 'Final';
  if (count <= 4) return 'Semi Finals';
  if (count <= 8) return 'Quarter Finals';
  return 'Round ' + (b.mainRoundsDone + 1);
}

function openScoring(matchId) {
  S.scoringMatchId = matchId;

}

function closeScoring() {
  S.scoringMatchId = null;

}

/* ── Score modal render ── */
function renderScoreModal() {
  const matchId = S.scoringMatchId;
  if (!matchId) return;

  let pair = null, round = null;
  for (const r of S.bracket.rounds) {
    const p = r.pairs.find(x => x.id === matchId);
    if (p) { pair = p; round = r; break; }
  }
  if (!pair) return;

  if (round.phase === 'redemption') {
    renderRedemptionScoreModal(pair, round);
  } else {
    render1v1ScoreModal(pair);
  }
}

function render1v1ScoreModal(pair) {
  const judges = S.judges;
  const v1 = pair.votes1 || 0;
  const v2 = pair.votes2 || 0;
  const total = v1 + v2;
  const remaining = judges - total;

  let preview = '';
  if (total === judges) {
    if (v1 > v2) preview = '<span class="winner-preview">🏆 ' + pair.t1 + ' wins</span>';
    else if (v2 > v1) preview = '<span class="winner-preview">🏆 ' + pair.t2 + ' wins</span>';
    else preview = '<span class="tie-preview">⚠️ Tie — check judge count (odd number recommended)</span>';
  } else {
    preview = remaining + ' vote' + (remaining !== 1 ? 's' : '') + ' remaining';
  }

  document.getElementById('sm-title').textContent = pair.t1 + ' vs ' + pair.t2;
  document.getElementById('sm-body').innerHTML =
    '<div class="competitor-vote"><div class="competitor-vote-name">' + pair.t1 + '</div>'
    + '<div class="vote-btns">' + Array.from({length: judges+1}, (_,i) =>
        '<button class="vbtn'+(v1===i?' on':'')+'" data-team="1" data-v="'+i+'"'+(i>judges-v2?' disabled':'')+'>'+i+'</button>'
      ).join('') + '</div><div class="vote-total">'+v1+'</div></div>'
    + '<div style="text-align:center;font-size:11px;color:var(--txt3);font-weight:700;padding:.25rem 0">JUDGES: '+judges+'</div>'
    + '<div class="competitor-vote"><div class="competitor-vote-name">' + pair.t2 + '</div>'
    + '<div class="vote-btns">' + Array.from({length: judges+1}, (_,i) =>
        '<button class="vbtn'+(v2===i?' on':'')+'" data-team="2" data-v="'+i+'"'+(i>judges-v1?' disabled':'')+'>'+i+'</button>'
      ).join('') + '</div><div class="vote-total">'+v2+'</div></div>'
    + '<div class="vote-summary">' + preview + '</div>'
    + '<button class="btn-p" id="sm-confirm" style="width:100%"'+(total!==judges||v1===v2?' disabled':'')+'>Confirm Result</button>';

  document.querySelectorAll('.vbtn').forEach(btn => btn.addEventListener('click', () => {
    const team = +btn.dataset.team, v = +btn.dataset.v;
    if (team === 1) pair.votes1 = v;
    else pair.votes2 = v;
    renderScoreModal();
  }));

  document.getElementById('sm-confirm')?.addEventListener('click', () => {
    pair.winner = pair.votes1 > pair.votes2 ? pair.t1 : pair.t2;
    pair.loser  = pair.votes1 > pair.votes2 ? pair.t2 : pair.t1;
    closeScoring();
    advanceBracket();
    render();
  });

  document.getElementById('sm-cancel')?.addEventListener('click', closeScoring);
}

function renderRedemptionScoreModal(match, round) {
  const judges = S.judges;
  const totalVotes = Object.values(match.votes).reduce((a, b) => a + b, 0);
  const allVoted = totalVotes >= judges;

  const max = allVoted ? Math.max(...Object.values(match.votes)) : 0;
  const leaders = allVoted
    ? Object.keys(match.votes).filter(k => match.votes[k] === max)
    : [];
  const tied = allVoted && leaders.length > 1;

  document.getElementById('sm-title').textContent = 'Redemption — ' + round.label;

  let html = match.brewers.map(name => {
    const v = match.votes[name] || 0;
    const lit = v > 0;
    return '<button class="rdvbtn" data-brewer="'+name+'"'+(allVoted?' disabled':'')+' style="display:flex;align-items:center;justify-content:space-between;width:100%;padding:.75rem 1rem;margin-bottom:8px;border-radius:var(--rad-s);border:1.5px solid '+(lit?'var(--pu)':'var(--border)')+';background:'+(lit?'var(--pu-bg)':'transparent')+';cursor:'+(allVoted?'default':'pointer')+'">'
      + '<span style="font-size:14px;font-weight:700;color:var(--txt)">'+name+'</span>'
      + '<span style="font-size:20px;font-weight:800;color:'+(lit?'var(--pu)':'var(--txt3)')+'">'+v+'</span>'
      + '</button>';
  }).join('');

  html += '<div style="text-align:center;font-size:13px;font-weight:600;color:var(--txt2);margin:.5rem 0 1rem">'
    + totalVotes+' of '+judges+' judges voted</div>';

  if (!tied) {
    html += '<button class="btn-p" id="sm-confirm" style="width:100%"'
      +(allVoted?'':' disabled')+'>Confirm Result</button>';
  }

  if (tied) {
    html += '<div style="padding:.75rem 1rem;background:var(--am-bg);border:2px solid var(--am-bd);border-radius:var(--rad-s);margin-top:1rem">'
      + '<div style="font-size:12px;font-weight:700;color:var(--am);margin-bottom:6px">Tied — '+leaders.join(', ')+'</div>'
      + '<div style="font-size:11px;color:var(--txt2);margin-bottom:10px;font-weight:600">Tiebreaker judge — tap to decide</div>'
      + leaders.map(name =>
          '<button class="rdtbtn" data-winner="'+name+'" style="display:block;width:100%;padding:.6rem 1rem;margin-bottom:6px;border-radius:var(--rad-s);border:1.5px solid var(--am-bd);background:var(--surface);cursor:pointer;font-size:14px;font-weight:700;color:var(--txt);text-align:left">'+name+'</button>'
        ).join('')
      + '</div>';
  }

  document.getElementById('sm-body').innerHTML = html;

  // Vote buttons — one tap per judge, capped at judge count
  document.querySelectorAll('.rdvbtn').forEach(btn => {
    btn.addEventListener('click', () => {
      const cur = Object.values(match.votes).reduce((a, b) => a + b, 0);
      if (cur < judges) {
        match.votes[btn.dataset.brewer] = (match.votes[btn.dataset.brewer] || 0) + 1;
        renderScoreModal();
      }
    });
  });

  // Confirm — no-tie path
  document.getElementById('sm-confirm')?.addEventListener('click', () => {
    const mx = Math.max(...Object.values(match.votes));
    match.winner = Object.keys(match.votes).filter(k => match.votes[k] === mx)[0];
    closeScoring();
    advanceBracket();
    render();
  });

  // Tiebreaker — single tap resolves
  document.querySelectorAll('.rdtbtn').forEach(btn => {
    btn.addEventListener('click', () => {
      match.tiebreaker = btn.dataset.winner;
      match.winner = btn.dataset.winner;
      closeScoring();
      advanceBracket();
      render();
    });
  });

  document.getElementById('sm-cancel')?.addEventListener('click', closeScoring);
}

    const names = S.participants.map(p => p.name);
    const round = b.rounds[0];
    const usedNames = round.pairs.flatMap(p => [p.t1, p.t2]).filter(Boolean);
    const opts = (selected, pairId, pos) =>
      '<option value="">— empty (bye) —</option>'
      + names.map(n => {
          const taken = usedNames.includes(n) && n !== selected;
          return '<option value="'+n+'"'+(n===selected?' selected':'')+(taken?' disabled':'')+'>'+n+'</option>';
        }).join('');

    out += '<div style="margin-bottom:1rem">'
      + '<div style="font-size:13px;font-weight:700;color:var(--txt2);margin-bottom:.5rem">Assign participants to bracket slots. Empty slots become byes on start.</div>'
      + round.pairs.map((p, i) => {
          const slotNum = i * 2;
          return '<div style="display:flex;align-items:center;gap:10px;padding:.6rem .9rem;background:var(--surface);border:1.5px solid var(--border);border-radius:var(--rad);margin-bottom:6px">'
            + '<span style="font-size:11px;font-weight:700;color:var(--txt3);min-width:52px">Match '+(i+1)+'</span>'
            + '<select class="ms-sel" data-pair="'+p.id+'" data-pos="t1" style="flex:1">'+opts(p.t1, p.id, 't1')+'</select>'
            + '<span style="font-size:11px;color:var(--txt3);flex-shrink:0">vs</span>'
            + '<select class="ms-sel" data-pair="'+p.id+'" data-pos="t2" style="flex:1">'+opts(p.t2, p.id, 't2')+'</select>'
            + '</div>';
        }).join('')
      + '</div>'
      + '<button class="btn-p" id="start-manual">▶ Start bracket</button>';
    return out;
  }
  b.rounds.forEach((round, ri) => {
    const isRd = round.phase === 'redemption';
    const col = roundColour(round.label, round.phase);
    const revivedNames = b.revivedNames || [];
    out += '<div class="bracket-section">'
      + '<div class="section-title" style="color:'+col.fg+';border-left:3px solid '+col.fg+';padding-left:8px">'
      + (isRd ? '🔄 ' : round.phase === 'third' ? '🥉 ' : '⚔️ ')
      + round.label
      + (isRd ? ' <span class="badge badge-pu" style="font-size:9px">Redemption</span>' : '')
      + (round.phase === 'third' ? ' <span class="badge badge-bl" style="font-size:9px">3rd Place</span>' : '')
      + '</div>'
      + round.pairs.map(pair => {
          const isCurrent = !isRoundComplete(round);
          const isDone = pair.winner !== null;
          const hasBoth = pair.t1 && pair.t2 && !pair.bye;
          const cls = pair.bye ? '' : isDone ? ' done' : hasBoth && isCurrent ? ' active' : '';
          const rdCls = isRd ? ' redemption' : '';
          const t1revived = revivedNames.includes(pair.t1);
          const t2revived = pair.t2 && revivedNames.includes(pair.t2);
          const revivedBadge = '<span style="display:inline-flex;align-items:center;gap:2px;font-size:9px;font-weight:700;color:var(--pu);background:var(--pu-bg);border:1px solid var(--pu-bd);border-radius:3px;padding:1px 5px;margin-left:5px;vertical-align:middle">⬆ R</span>';

          let footer = '';
          if (pair.bye) {
            footer = '<div class="bslot-footer"><span class="bslot-status bye">🎫 Bye — advances automatically</span></div>';
          } else if (isDone) {
            footer = '<div class="bslot-footer"><span class="bslot-status done-lbl">🏆 '+pair.winner+' advances</span><button class="btn-sm btn-o" style="font-size:10px" data-reopen="'+pair.id+'">Edit</button></div>';
          } else if (hasBoth && isCurrent) {
            footer = '<div class="bslot-footer"><span class="bslot-status ready">Ready to score</span><button class="btn-sm btn-am" data-score="'+pair.id+'">▶ Score</button></div>';
          } else {
            footer = '<div class="bslot-footer"><span class="bslot-status">⏳ Awaiting previous results</span></div>';
          }

          const t1cls = isDone ? (pair.t1===pair.winner?' winner':' loser') : '';
          const t2cls = isDone ? (pair.t2===pair.winner?' winner':' loser') : '';

          return '<div class="bslot'+cls+rdCls+'" style="border-top-color:'+col.fg+'">'
            + '<div class="bslot-hdr" style="background:'+col.bg+';color:'+col.fg+'"><span>'+round.label+'</span>'+(pair.votes1||pair.votes2?'<span style="font-size:10px">'+pair.votes1+' – '+pair.votes2+'</span>':'')+'</div>'
            + '<div class="bslot-teams">'
            + '<div class="bslot-team'+(pair.t1===pair.winner?' winner-row':'')+'"><span class="bslot-name'+(pair.t1?t1cls:' tbd')+'">'+(pair.t1||'TBD')+(t1revived?revivedBadge:'')+'</span>'+(pair.votes1>0?'<span class="bslot-votes">'+pair.votes1+'</span>':'')+'</div>'
            + (pair.bye ? '' : '<div class="bslot-divider"></div><div class="bslot-team'+(pair.t2===pair.winner?' winner-row':'')+'"><span class="bslot-name'+(pair.t2?t2cls:' tbd')+'">'+(pair.t2||'TBD')+(t2revived?revivedBadge:'')+'</span>'+(pair.votes2>0?'<span class="bslot-votes">'+pair.votes2+'</span>':'')+'</div>')
            + '</div>'+footer+'</div>';
        }).join('')
      + '</div>';
  });

  // Revival draw pending — show draw interface
  if (wcAccess.allowed && b.pendingWildCard) {
    const losers = b.pendingWildCardLosers || [];
    out += '<div style="padding:1.25rem;background:var(--pu-bg);border:2px solid var(--pu-bd);border-radius:var(--rad);margin-bottom:1rem">'
      + '<div style="font-size:11px;font-weight:700;color:var(--pu);letter-spacing:.15em;text-transform:uppercase;margin-bottom:6px">🃏 Revival Draw</div>'
      + '<p style="font-size:13px;color:var(--txt2);margin-bottom:12px">Round complete. Draw a revival to randomly revive one eliminated competitor, or skip to continue.</p>'
      + '<div style="display:flex;gap:10px;flex-wrap:wrap">'
      + '<button class="btn-p" id="do-draw-wc" style="background:var(--pu);border-color:var(--pu)">🃏 Revival Draw ('+ losers.length +' in pool)</button>'
      + '<button class="btn-o" id="skip-wc">Skip → Continue</button>'
      + '</div></div>';
  }

  // Revival draw just drawn — show reveal
  if (wcAccess.allowed && S.wildCard && b.wildCards) {
    const latest = Object.entries(b.wildCards).filter(([,v])=>v).slice(-1)[0];
    if (latest && b.rounds.length > 0) {
      const drawnRound = +latest[0];
      const drawnName = latest[1];
      const justDone = b.mainRoundsDone === drawnRound;
      if (justDone) {
        out += '<div style="padding:1.25rem;background:var(--pu-bg);border:2px solid var(--pu-bd);border-radius:var(--rad);margin-bottom:1rem;text-align:center">'
          + '<div style="font-size:11px;font-weight:700;color:var(--pu);letter-spacing:.15em;text-transform:uppercase;margin-bottom:6px">🃏 Revival Draw!</div>'
          + '<div style="font-size:22px;font-weight:700;color:var(--pu);margin-bottom:4px">'+drawnName+'</div>'
          + '<p style="font-size:12px;color:var(--txt3);margin-bottom:12px">Revived and entering the next round</p>'
          + '<button class="btn-p" id="wc-continue" data-round="'+drawnRound+'" style="background:var(--pu);border-color:var(--pu)">Continue → Next Round</button>'
          + '</div>';
      }
    }
  }

  // Lucky loser pending — show draw interface
  if (rdAccess.allowed && b.pendingLuckyLoser && !b.pendingLuckyLoser.done) {
    const pending = b.pendingLuckyLoser;
    const drawn = b.luckyLosers || [];
    out += '<div style="padding:1.25rem;background:var(--pu-bg);border:2px solid var(--pu-bd);border-radius:var(--rad);margin-bottom:1rem">'
      + '<div style="font-size:11px;font-weight:700;color:var(--pu);letter-spacing:.15em;text-transform:uppercase;margin-bottom:6px">🎲 Lucky Loser Draw</div>'
      + '<p style="font-size:13px;color:var(--txt2);margin-bottom:8px">Redemption round complete — '+(drawn.length)+' of '+(drawn.length + pending.slotsNeeded)+' lucky loser'+(drawn.length + pending.slotsNeeded > 1 ? 's' : '')+' drawn.</p>'
      + (drawn.length ? '<div style="margin-bottom:10px">'+drawn.map(n=>'<span style="display:inline-block;font-size:13px;font-weight:700;color:var(--pu);background:#fff;border:1.5px solid var(--pu-bd);border-radius:var(--rad-s);padding:3px 10px;margin:2px 4px 2px 0">'+n+' ⬆ R</span>').join('')+'</div>' : '')
      + '<div style="display:flex;gap:10px;flex-wrap:wrap">'
      + '<button class="btn-p" id="do-draw-ll" style="background:var(--pu);border-color:var(--pu)">🎲 Draw Lucky Loser ('+pending.slotsNeeded+' remaining · '+pending.pool.length+' in pool)</button>'
      + '</div></div>';
  }

  // Lucky loser all drawn — show continue
  if (rdAccess.allowed && b.pendingLuckyLoser && b.pendingLuckyLoser.done) {
    const drawn = b.luckyLosers || [];
    out += '<div style="padding:1.25rem;background:var(--pu-bg);border:2px solid var(--pu-bd);border-radius:var(--rad);margin-bottom:1rem;text-align:center">'
      + '<div style="font-size:11px;font-weight:700;color:var(--pu);letter-spacing:.15em;text-transform:uppercase;margin-bottom:6px">🎲 Lucky Losers Drawn!</div>'
      + '<div style="margin-bottom:10px">'+drawn.map(n=>'<div style="font-size:20px;font-weight:700;color:var(--pu);margin-bottom:4px">'+n+' ⬆ R</div>').join('')+'</div>'
      + '<p style="font-size:12px;color:var(--txt3);margin-bottom:12px">Revived and entering the next round</p>'
      + '<button class="btn-p" id="ll-continue" style="background:var(--pu);border-color:var(--pu)">Continue → Next Round</button>'
      + '</div>';
  }

  if (b.phase === 'done') {
    const finalRound = b.rounds.filter(r => r.phase === 'main' && r.label === 'Final').slice(-1)[0];
    const thirdRound = b.rounds.filter(r => r.phase === 'third').slice(-1)[0];
    const finalPair  = finalRound?.pairs[0];
    const thirdPair  = thirdRound?.pairs[0];
    if (finalPair) {
      out += '<div style="padding:1.5rem;background:var(--am-bg);border:2px solid var(--am-bd);border-radius:var(--rad);text-align:center;margin-top:.5rem">'
        + '<div style="font-size:11px;font-weight:700;color:var(--am);letter-spacing:.15em;text-transform:uppercase;margin-bottom:6px">🏆 Champion</div>'
        + '<div style="font-size:26px;font-weight:700;color:var(--am);margin-bottom:2px">'+finalPair.winner+'</div>'
        + (finalPair.loser ? '<div style="font-size:13px;color:var(--txt3)">🥈 '+finalPair.loser+'</div>' : '')
        + (thirdPair?.winner ? '<div style="font-size:13px;color:var(--txt3);margin-top:6px">🥉 '+thirdPair.winner+'</div>' : '')
        + '</div>';
    }
  }
  return out || '<div class="empty">Bracket is empty.</div>';
}

/* ── Round colour helper ── */
function roundColour(label, phase) {
  if (phase === 'redemption') return { bg: 'var(--pu-bg)', bd: 'var(--pu-bd)', fg: 'var(--pu)' };
  if (phase === 'third')      return { bg: 'var(--bl-bg)', bd: 'var(--bl-bd)', fg: 'var(--bl)' };
  const l = label.toLowerCase();
  if (l === 'final')         return { bg: 'var(--gn-bg)', bd: 'var(--gn-bd)', fg: 'var(--gn)' };
  if (l.includes('semi'))    return { bg: 'var(--am-bg)', bd: 'var(--am-bd)', fg: 'var(--am)' };
  if (l.includes('quarter')) return { bg: 'var(--bl-bg)', bd: 'var(--bl-bd)', fg: 'var(--bl)' };
  if (l.includes('round 1')) return { bg: 'var(--bg)',    bd: 'var(--border)', fg: 'var(--txt3)' };
  // Round 2, 3, etc.
  return { bg: 'var(--bl-bg)', bd: 'var(--bl-bd)', fg: 'var(--bl)' };
}

/* ── Audience ── */
function showAudience() {
  EventConfig.writeHandoff();
  const revivedNames = S.bracket ? (S.bracket.revivedNames || []) : [];

  // Saturated hex per CONVENTIONS — boosted for projector output
  function audCol(label, phase) {
    if (phase === 'redemption') return { bg:'#DDD6FE', bd:'#7C3AED', fg:'#5B21B6', bar:'#7C3AED' };
    if (phase === 'third')      return { bg:'#BFDBFE', bd:'#2563EB', fg:'#1D4ED8', bar:'#2563EB' };
    const l = label.toLowerCase();
    if (l === 'final')         return { bg:'#A7F3D0', bd:'#059669', fg:'#065F46', bar:'#059669' };
    if (l.includes('semi'))    return { bg:'#FDE68A', bd:'#D97706', fg:'#92400E', bar:'#D97706' };
    if (l.includes('quarter')) return { bg:'#BFDBFE', bd:'#2563EB', fg:'#1D4ED8', bar:'#2563EB' };
    if (l.includes('round 1')) return { bg:'#E5E7EB', bd:'#6B7280', fg:'#374151', bar:'#6B7280' };
    return { bg:'#BFDBFE', bd:'#2563EB', fg:'#1D4ED8', bar:'#2563EB' };
  }

  const revBadge = '<span style="font-size:10px;font-weight:700;color:#5B21B6;background:#DDD6FE;border:1.5px solid #7C3AED;border-radius:3px;padding:1px 5px;margin-left:6px;vertical-align:middle;flex-shrink:0">⬆ R</span>';

  const done = S.bracket
    ? S.bracket.rounds.flatMap(r => r.pairs.filter(p => p.winner && !p.bye).map(p => ({...p, roundLabel: r.label, phase: r.phase}))).reverse()
    : [];

  // Group by round label for section dividers
  const grouped = [];
  done.forEach(p => {
    const last = grouped[grouped.length - 1];
    if (last && last.label === p.roundLabel) { last.matches.push(p); }
    else { grouped.push({ label: p.roundLabel, phase: p.phase, matches: [p] }); }
  });

  const histHTML = grouped.length ? grouped.map(group => {
    const col = audCol(group.label, group.phase);
    const matchRows = group.matches.map(p => {
      const t1win = p.winner === p.t1;
      const t2win = p.winner === p.t2;
      const t1rev = revivedNames.includes(p.t1);
      const t2rev = p.t2 && revivedNames.includes(p.t2);
      return '<div style="display:flex;align-items:center;gap:10px;padding:.75rem 1rem;background:#fff;border-radius:8px;margin-bottom:6px;box-shadow:0 1px 4px rgba(0,0,0,.10)">'
        + '<div style="flex:1;display:flex;align-items:center;justify-content:flex-end;gap:6px;min-width:0">'
        + '<span style="font-size:17px;font-weight:'+(t1win?800:500)+';color:'+(t1win?'#1C1917':'#9CA3AF')+';overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+p.t1+'</span>'
        + (t1rev ? revBadge : '')
        + '</div>'
        + '<div style="font-size:28px;font-weight:900;color:'+(t1win?col.bar:'#D1D5DB')+';flex-shrink:0;min-width:34px;text-align:center;line-height:1">'+p.votes1+'</div>'
        + '<div style="font-size:11px;font-weight:700;color:#9CA3AF;flex-shrink:0;padding:0 2px">vs</div>'
        + '<div style="font-size:28px;font-weight:900;color:'+(t2win?col.bar:'#D1D5DB')+';flex-shrink:0;min-width:34px;text-align:center;line-height:1">'+p.votes2+'</div>'
        + '<div style="flex:1;display:flex;align-items:center;gap:6px;min-width:0">'
        + (t2rev ? revBadge : '')
        + '<span style="font-size:17px;font-weight:'+(t2win?800:500)+';color:'+(t2win?'#1C1917':'#9CA3AF')+';overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+p.t2+'</span>'
        + '</div>'
        + '</div>';
    }).join('');

    return '<div style="margin-bottom:20px">'
      + '<div style="display:flex;align-items:center;gap:10px;margin-bottom:10px">'
      + '<div style="height:3px;flex:1;background:'+col.bar+';border-radius:2px;opacity:.35"></div>'
      + '<div style="font-size:11px;font-weight:800;color:'+col.fg+';background:'+col.bg+';border:2px solid '+col.bd+';border-radius:5px;padding:3px 10px;text-transform:uppercase;letter-spacing:.08em;white-space:nowrap">'+group.label+'</div>'
      + '<div style="height:3px;flex:1;background:'+col.bar+';border-radius:2px;opacity:.35"></div>'
      + '</div>'
      + matchRows
      + '</div>';
  }).join('') : '';

  // Module tag — current round label or Final when done
  const activeRound = getActiveRound();
  const moduleTag = S.bracket
    ? (S.bracket.phase === 'done' ? 'Final' : (activeRound?.label || 'Live'))
    : '';

  // Podium data — built when bracket is complete
  let podiumData = null;
  if (S.bracket?.phase === 'done') {
    const finalRound = S.bracket.rounds.filter(r => r.phase === 'main' && r.label === 'Final').slice(-1)[0];
    const thirdRound = S.bracket.rounds.filter(r => r.phase === 'third').slice(-1)[0];
    const finalPair  = finalRound?.pairs[0];
    if (finalPair?.winner) {
      const sfLosers = S.bracket.rounds
        .filter(r => r.label === 'Semi Finals')
        .flatMap(r => r.pairs.filter(p => p.loser).map(p => p.loser));
      const rank3 = thirdRound?.pairs[0]?.winner || sfLosers.join(' · ');
      podiumData = [
        { rank: 1, name: finalPair.winner },
        { rank: 2, name: finalPair.loser || '' },
        { rank: 3, name: rank3 },
      ].filter(d => d.name);
    }
  }

  Audience.show({
    title: S.eventName || 'Throwdown 1v1',
    moduleTag,
    histHTML,
    podium: podiumData,
  });
}

/* ── Seduh Records archive (POA-40) ──
   Fires once per event, as a side effect of the shared champion-confirmation
   choke point (render(), called by every path that sets b.phase = 'done').
   Non-blocking, fail-open — never awaited by render(), errors caught silently. */
function computeParticipantRounds(b) {
  const reached = {};
  b.rounds.forEach(r => {
    const names = r.phase === 'redemption' ? (r.pairs.flatMap(p => p.brewers || [])) : r.pairs.flatMap(p => [p.t1, p.t2].filter(Boolean));
    names.forEach(n => { reached[n] = r.label; }); // later rounds overwrite — furthest round reached
  });
  return reached;
}

function maybeArchiveChampion() {
  const b = S.bracket;
  if (!b || b.phase !== 'done' || b._archived) return;
  const finalRound = b.rounds.filter(r => r.phase === 'main' && r.label === 'Final').slice(-1)[0];
  const finalPair = finalRound?.pairs[0];
  if (!finalPair?.winner) return; // event abandoned mid-bracket — no confirmed champion, no write

  b._archived = true; // set + persist immediately so a reload can never re-fire this
  save();

  const reached = computeParticipantRounds(b);
  const record = {
    eventName: S.eventName || '',
    eventDate: S.eventDate || '', // string, not timestamp — see CHANGELOG (spec deviation)
    orgId: window._tdUid || null,
    champion: finalPair.winner,
    runnerUp: finalPair.loser || '',
    participants: S.participants.map(p => ({ name: p.name, roundReached: reached[p.name] || 'Round 1' })),
    revivalUsed: b.revivedNames || [],
    redemptionUsed: !!S.redemption,
    isTest: S.isTest !== false,
  };
  archiveThrowdownRecord(record);
}

async function archiveThrowdownRecord(record) {
  try {
    const { collection, addDoc, serverTimestamp } = await import('https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js');
    await addDoc(collection(window._sdDb, 'throwdown_records'), { ...record, createdAt: serverTimestamp() });
  } catch (e) {
    // Fail silently by design — localStorage remains the record of truth for this event.
    console.warn('Seduh Records archive failed (non-blocking):', e);
  }
}

/* ── MUA-06 chrome ── */
function doReset() {
  if (confirm('Reset ALL throwdown data? Cannot be undone.')) {
    STORE.clear(); mid = 0; S = DEFAULT_STATE(); render();
  }
}

function handleToolbarAction(act) {
  if (act === 'save')        exportJSON();
  else if (act === 'load')   importJSON();
  else if (act === 'podium') Audience.showPodium();
  else if (act === 'reset')  doReset();
}

function buildSheet(overflow, resetInMore) {
  const title = document.getElementById('ms-title');
  const list  = document.getElementById('ms-list');
  if (!list) return;
  if (title) title.textContent = 'More actions';
  const meta = {
    save:   { label: 'Save',        icon: '💾' },
    load:   { label: 'Load',        icon: '📂' },
    podium: { label: 'View podium', icon: '🏆' },
  };
  const rows = overflow.map(id => {
    const a = meta[id] || { label: id, icon: '•' };
    return '<button class="ms-item" data-act="' + id + '">'
      + '<span class="ms-ic">' + a.icon + '</span>' + a.label
      + '</button>';
  }).join('');
  const reset = resetInMore
    ? '<div class="ms-divider">Danger zone</div>'
      + '<button class="ms-item ms-reset" data-act="reset">'
      + '<span class="ms-ic">↺</span>Reset event'
      + '<span class="ms-cap">clears all</span>'
      + '</button>'
    : '';
  list.innerHTML = rows + reset;
  list.querySelectorAll('[data-act]').forEach(btn => {
    btn.onclick = () => { closeSheet(); handleToolbarAction(btn.dataset.act); };
  });
}

function fitToolbar() {
  const tb      = document.getElementById('mod-toolbar');
  const moreBtn = document.getElementById('moreBtn');
  if (!tb || !moreBtn) return;
  const secEls  = Array.from(document.querySelectorAll('.tb-sec'));
  const resetEl = document.getElementById('resetbtn');
  const gap     = 8;
  secEls.forEach(el => el.style.display = '');
  if (resetEl) resetEl.style.display = '';
  moreBtn.style.display = 'none';
  const padL  = parseInt(getComputedStyle(tb).paddingLeft);
  const padR  = parseInt(getComputedStyle(tb).paddingRight);
  const avail = tb.clientWidth - padL - padR;
  const required = () => {
    const kids = Array.from(tb.children).filter(c => getComputedStyle(c).display !== 'none');
    let w = 0;
    kids.forEach(c => { w += c.offsetWidth; });
    return w + gap * Math.max(0, kids.length - 1);
  };
  const fits = () => required() <= avail + 1;
  const overflow  = [];
  let resetInMore = false;
  if (!fits()) {
    moreBtn.style.display = 'inline-flex';
    if (resetEl) { resetEl.style.display = 'none'; resetInMore = true; }
    for (let i = secEls.length - 1; i >= 0 && !fits(); i--) {
      secEls[i].style.display = 'none';
      overflow.unshift(secEls[i].dataset.act);
    }
  }
  buildSheet(overflow, resetInMore);
  const ct = moreBtn.querySelector('.ct');
  if (ct) ct.textContent = overflow.length + (resetInMore ? 1 : 0);
}

function measure() {
  const hdr  = document.querySelector('.plat-hdr');
  const tabs = document.getElementById('tabs');
  if (hdr && tabs) tabs.style.top = hdr.offsetHeight + 'px';
  const active = tabs && tabs.querySelector('.mtab.on');
  if (active && tabs) tabs.scrollLeft = active.offsetLeft - (tabs.clientWidth - active.offsetWidth) / 2;
}

function openSheet() {
  document.getElementById('more-sheet')?.classList.add('open');
  document.getElementById('sheet-scrim')?.classList.add('open');
}
function closeSheet() {
  document.getElementById('more-sheet')?.classList.remove('open');
  document.getElementById('sheet-scrim')?.classList.remove('open');
}

/* ── Bind ── */
function bind() {
  const $ = id => document.getElementById(id);
  const on = (id,ev,fn) => { const el=$(id); if(el) el.addEventListener(ev,fn); };

  Timer.init();
  Audience.init();
  EventConfig.mount('#event-config-slot');
  on('tmrbtn','click',() => Timer.open());
  on('savejsonbtn','click',() => exportJSON());
  on('loadjsonbtn','click',() => importJSON());
  on('audbtn','click',() => showAudience());
  on('podiumBtn','click',() => Audience.showPodium());

  // MUA-06 toolbar wiring
  on('moreBtn', 'click', openSheet);
  on('sheet-scrim', 'click', closeSheet);
  if (!chromeInited) {
    chromeInited = true;
    window.addEventListener('scroll', () => {
      const tabs = document.getElementById('tabs');
      const hdr  = document.querySelector('.plat-hdr');
      if (tabs && hdr) tabs.classList.toggle('stuck', window.scrollY > hdr.offsetHeight + 4);
    });
    window.addEventListener('resize', fitToolbar);
  }
  fitToolbar();
  measure();

  // Tabs
  document.querySelectorAll('[data-tab]').forEach(b => b.addEventListener('click',()=>{S.tab=b.dataset.tab;render();}));

  // Reset
  on('resetbtn','click', doReset);

  // Event info
  [['ev-name','eventName'],['ev-date','eventDate'],['ev-venue','eventVenue']].forEach(([id,key])=>{
    on(id,'input',() => { S[key]=$(id).value; save(); });
  });

  // Judge range
  on('judge-range','input',() => {
    S.judges = +$('judge-range').value;
    $('judge-display').textContent = S.judges;
    save();
  });

  // Redemption
  on('rd-enable','change',() => {
    S.redemption = $('rd-enable').checked;
    const off = 'opacity:.35;pointer-events:none';
    const on2 = '';
    $('rd-rounds').style.cssText = S.redemption ? on2 : off;
    $('rd-cap-row').style.cssText = S.redemption ? on2 : off;
    $('rd-group-row').style.cssText = S.redemption ? on2 : off;
    save();
  });
  on('rd-r1','change',() => { S.redemptionRounds.r1 = $('rd-r1').checked; save(); });
  on('rd-r2','change',() => { S.redemptionRounds.r2 = $('rd-r2').checked; save(); });
  on('rd-cap','change',() => { S.redemptionCap = Math.max(0, +$('rd-cap').value||0); save(); });
  on('rd-group','change',() => { S.redemptionGroupSize = Math.min(4, Math.max(2, +$('rd-group').value||3)); save(); });

  // Wild card
  on('wc-enable','change',() => { S.wildCard = $('wc-enable').checked; save(); });
  on('tp-enable','change',() => { S.thirdPlace = $('tp-enable').checked; save(); });
  on('td-test-enable','change',() => { S.isTest = $('td-test-enable').checked; save(); });
  on('do-draw-wc','click',() => { drawWildCard(); });
  on('wc-continue','click',() => { const btn = $('wc-continue'); continueAfterWildCard(+(btn?.dataset.round||0)); });
  on('skip-wc','click',() => { skipWildCard(); });
  on('do-draw-ll','click',() => { drawLuckyLoser(); });
  on('ll-continue','click',() => { continueAfterLuckyLoser(); });

  // Judges list
  const addJ = () => {
    const inp = $('j-inp'); if (!inp) return;
    const name = inp.value.trim();
    if (name && !S.judgeList.some(j => j.name.toLowerCase()===name.toLowerCase())) {
      S.judgeList.push({ name });
      inp.value=''; render();
    } else inp.value='';
  };
  on('j-add','click', addJ);
  on('j-inp','keydown', e => e.key==='Enter' && addJ());
  document.querySelectorAll('[data-jrm]').forEach(b => b.addEventListener('click',()=>{
    S.judgeList = S.judgeList.filter(j=>j.name!==b.dataset.jrm); render();
  }));

  // Participants
  const addP = () => {
    const inp = $('p-inp'); if (!inp) return;
    const name = inp.value.trim();
    if (name && !S.participants.some(p => p.name.toLowerCase()===name.toLowerCase())) {
      S.participants.push({ name });
      inp.value=''; render();
    } else inp.value='';
  };
  on('p-add','click', addP);
  on('p-inp','keydown', e => e.key==='Enter' && addP());
  document.querySelectorAll('[data-prm]').forEach(b => b.addEventListener('click',()=>{
    S.participants = S.participants.filter(p=>p.name!==b.dataset.prm); render();
  }));

  // Generate bracket
  on('gen-bracket','click',() => {
    mid = 0;
    if (S.manualBracket) {
      S.manualSlots = Math.max(2, +($('mb-slots')?.value) || S.participants.length || 2);
      generateManualBracket();
      S.tab = 'bracket';
    } else {
      generateBracket();
      S.tab = 'bracket';
    }
    render();
  });

  // Manual bracket mode toggle
  on('mb-enable','change',() => { S.manualBracket = $('mb-enable').checked; save(); render(); });
  on('mb-slots','change',() => { S.manualSlots = Math.max(2, +$('mb-slots').value||2); save(); render(); });

  // Manual slot selects — save state without full re-render to preserve focus
  document.querySelectorAll('.ms-sel').forEach(sel => {
    sel.addEventListener('change', () => {
      const pairId = sel.dataset.pair;
      const pos = sel.dataset.pos;
      const pair = S.bracket?.rounds[0]?.pairs.find(p => p.id === pairId);
      if (pair) { pair[pos] = sel.value || null; save(); }
      refreshManualSelects();
    });
  });

  // Start manual bracket
  on('start-manual','click',() => { startManualBracket(); });

  // Score buttons
  document.querySelectorAll('[data-score]').forEach(b => b.addEventListener('click',()=>{
    S.scoringMatchId = b.dataset.score;
    renderScoreModal();
    document.getElementById('score-modal').style.display='flex';
  }));
  document.querySelectorAll('[data-reopen]').forEach(b => b.addEventListener('click',()=>{
    // Find and reset pair for editing
    for (const round of S.bracket.rounds) {
      const p = round.pairs.find(x=>x.id===b.dataset.reopen);
      if (p) { p.winner=null; p.loser=null; break; }
    }
    S.scoringMatchId = b.dataset.reopen;
    renderScoreModal();
    document.getElementById('score-modal').style.display='flex';
    render();
  }));
  on('sm-cancel','click', closeScoring);
  on('load-demo','click',()=>{if(confirm('Load demo data? This will replace your current data.')){loadThrowdownDemo();render();}});
}
